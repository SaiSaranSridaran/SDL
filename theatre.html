<!DOCTYPE html>
<html>
<head>
    <title>Select Theatre</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .box {
            background: #1f2933;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            text-align: center;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #4CAF50;
            color: white;
        }
        .logout {
            background: red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Select Theatre</h2>

    <select id="theatre">
        <option value="PVR Cinemas">PVR Cinemas</option>
        <option value="INOX">INOX</option>
        <option value="Cinepolis">Cinepolis</option>
    </select>

    <button onclick="nextPage()">Continue</button>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
function nextPage() {
    let theatre = document.getElementById("theatre").value;
    localStorage.setItem("theatre", theatre);
    window.location.href = "booking.html";
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
