<!DOCTYPE html>
<html>
<head>
    <title>Book Tickets</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .container {
            background: #1f2933;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
        }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #4CAF50;
            color: white;
        }
        .logout {
            background: red;
        }
        .summary {
            margin-top: 20px;
            background: #2d3748;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎟 Ticket Booking</h2>

    <p id="theatreName"></p>

    <select id="movie">
        <option value="150">Avengers – ₹150</option>
        <option value="200">Inception – ₹200</option>
        <option value="180">Interstellar – ₹180</option>
    </select>

    <input type="number" id="tickets" min="1" value="1">

    <button onclick="confirmBooking()">Confirm Booking</button>
    <button class="logout" onclick="logout()">Logout</button>

    <div class="summary" id="summary"></div>
</div>

<script>
document.getElementById("theatreName").innerText =
    "Theatre: " + localStorage.getItem("theatre");

function confirmBooking() {
    let movie = document.getElementById("movie");
    let movieName = movie.options[movie.selectedIndex].text;
    let price = movie.value;
    let tickets = document.getElementById("tickets").value;

    if(tickets <= 0) {
        alert("Please select at least 1 ticket");
        return;
    }

    let total = price * tickets;

    document.getElementById("summary").innerHTML =
        "<h3>Booking Confirmed ✅</h3>" +
        "<p>User: " + localStorage.getItem("username") + "</p>" +
        "<p>" + movieName + "</p>" +
        "<p>Tickets: " + tickets + "</p>" +
        "<p>Total Price: ₹" + total + "</p>";
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
